<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل النشاط التجاري - الصور ورقم العداد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* نفس الأنماط السابقة - اختصار للاختصار */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 30px 20px; }
        .main-wrapper { max-width: 1300px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.97); border-radius: 32px; padding: 30px 35px; margin-bottom: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35); }
        h2, h3 { display: flex; align-items: center; gap: 12px; }
        h2 { justify-content: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 12px; }
        .image-upload-card { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 24px; padding: 16px; text-align: center; cursor: pointer; }
        .image-preview-small { max-width: 100%; max-height: 110px; margin-top: 12px; border-radius: 16px; display: none; }
        button.submit-btn { background: linear-gradient(95deg, #1e3c72, #2a5298); color: white; border: none; padding: 16px; font-size: 18px; border-radius: 60px; width: 100%; margin-top: 20px; cursor: pointer; }
        .message { margin-top: 20px; padding: 14px; border-radius: 60px; display: none; text-align: center; }
        .success { background: #dcfce7; color: #166534; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; }
        .download-btn { background: #0f3b5f; color: white; border: none; border-radius: 40px; padding: 6px 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="card">
        <h2><i class="fas fa-store"></i> تسجيل النشاط التجاري</h2>
        <form id="registerForm">
            <label><i class="fas fa-tachometer-alt"></i> رقم العداد (إجباري)</label>
            <input type="text" id="meterNumber" placeholder="أدخل رقم العداد" required style="width:100%; padding:12px; margin-bottom:20px;">
            
            <label><i class="fas fa-camera"></i> الصور (5 صور - اضغط للتصوير)</label>
            <div class="images-grid" id="imagesContainer"></div>
            
            <button type="submit" class="submit-btn" id="sendBtn"><i class="fas fa-cloud-upload-alt"></i> رفع البيانات والصور</button>
            <div id="formMessage" class="message"></div>
        </form>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <h3><i class="fas fa-database"></i> السجلات المسجلة</h3>
            <button class="refresh-btn" id="refreshRecordsBtn" style="background:#e2e8f0; border:none; padding:8px 16px; border-radius:30px;">تحديث</button>
        </div>
        <div style="overflow-x:auto;">
            <table id="recordsTable">
                <thead><tr><th>رقم العداد</th><th>التاريخ</th><th>عدد الصور</th><th>تحميل ZIP</th></tr></thead>
                <tbody id="recordsTbody"><tr><td colspan="4">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------
    //  إعدادات - يجب تعديل الرابط بعد نشر السكريبت
    // ------------------------------------------------
    const IMGBB_API_KEY = '80e250fa77e32dc6df4bbd54eb7af292';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznuC2UC2QuPkJDuy98CxHYwzuOCDTjMixxP20kO2vyeejSaGE67uxtj_NbAYhR1Ofx5w/exec'; // ⚠️ استبدل برابطك الفعلي

    let imageFiles = [null, null, null, null, null];
    let previewElements = [];
    let nameSpans = [];

    function buildImageUploaders() {
        const container = document.getElementById('imagesContainer');
        container.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const card = document.createElement('div');
            card.className = 'image-upload-card';
            card.innerHTML = `<i class="fas fa-camera" style="font-size:36px;"></i><span>الصورة ${i+1}</span>`;
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.capture = 'environment';
            fileInput.style.display = 'none';
            fileInput.setAttribute('data-idx', i);
            const preview = document.createElement('img');
            preview.className = 'image-preview-small';
            const fileNameSpan = document.createElement('div');
            fileNameSpan.className = 'file-name';
            
            card.appendChild(fileInput);
            card.appendChild(preview);
            card.appendChild(fileNameSpan);
            
            card.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const idx = parseInt(fileInput.getAttribute('data-idx'));
                const file = e.target.files[0];
                if (file) {
                    imageFiles[idx] = file;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        preview.src = ev.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                    fileNameSpan.innerText = file.name.length > 30 ? file.name.substr(0,27)+'...' : file.name;
                } else {
                    imageFiles[idx] = null;
                    preview.style.display = 'none';
                    fileNameSpan.innerText = '';
                }
            });
            container.appendChild(card);
            previewElements.push(preview);
            nameSpans.push(fileNameSpan);
        }
    }

    async function uploadImageToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
        });
        if (!response.ok) {
            const text = await response.text();
            throw new Error(`ImgBB error ${response.status}: ${text}`);
        }
        const data = await response.json();
        if (!data.success) throw new Error('ImgBB failed: ' + JSON.stringify(data));
        return data.data.url;
    }

    async function uploadAllImages() {
        const urls = [];
        for (let i = 0; i < imageFiles.length; i++) {
            if (imageFiles[i]) {
                try {
                    const url = await uploadImageToImgBB(imageFiles[i]);
                    urls.push(url);
                } catch (err) {
                    throw new Error(`فشل رفع الصورة ${i+1}: ${err.message}`);
                }
            }
        }
        if (urls.length === 0) throw new Error('لم يتم اختيار أي صورة');
        return urls;
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('formMessage');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => { msgDiv.style.display = 'none'; }, 6000);
    }

    const form = document.getElementById('registerForm');
    const sendBtn = document.getElementById('sendBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const meterNumber = document.getElementById('meterNumber').value.trim();
        if (!meterNumber) return showMessage('رقم العداد مطلوب', 'error');
        if (!imageFiles.some(f => f)) return showMessage('يرجى التقاط صورة واحدة على الأقل', 'error');

        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري رفع الصور...';

        try {
            const imageUrls = await uploadAllImages();
            const payload = { meterNumber, images: imageUrls, timestamp: new Date().toISOString() };
            
            // إرسال إلى Google Sheets
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            if (result.result === 'success') {
                showMessage('✅ تم الحفظ بنجاح!', 'success');
                // إعادة تعيين الحقول
                document.getElementById('meterNumber').value = '';
                imageFiles.fill(null);
                previewElements.forEach(p => { p.style.display = 'none'; p.src = ''; });
                nameSpans.forEach(s => s.innerText = '');
                document.querySelectorAll('.image-upload-card input').forEach(inp => inp.value = '');
                loadRecords();
            } else {
                throw new Error(result.error || 'فشل من الخادم');
            }
        } catch (err) {
            console.error(err);
            showMessage('❌ فشل الإرسال: ' + err.message, 'error');
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> رفع البيانات والصور';
        }
    });

    async function loadRecords() {
        const tbody = document.getElementById('recordsTbody');
        tbody.innerHTML = ' rotations<td colspan="4">جاري التحميل...</td></tr>';
        try {
            const response = await fetch(`${SCRIPT_URL}?action=fetch&t=${Date.now()}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.result === 'success' && Array.isArray(data.records)) {
                renderTable(data.records);
            } else {
                tbody.innerHTML = '<tr><td colspan="4">لا توجد سجلات أو خطأ في القراءة</td></tr>';
            }
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4">فشل تحميل السجلات: ${err.message}</td></tr>`;
        }
    }

    function renderTable(records) {
        const tbody = document.getElementById('recordsTbody');
        if (!records.length) {
            tbody.innerHTML = '<tr><td colspan="4">لا توجد سجلات بعد</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        records.forEach(rec => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = rec.meterNumber || '-';
            row.insertCell(1).textContent = rec.date ? new Date(rec.date).toLocaleString('ar-SA') : '-';
            const imgCount = (rec.imagesUrls || []).length;
            row.insertCell(2).textContent = imgCount;
            const btnCell = row.insertCell(3);
            const btn = document.createElement('button');
            btn.className = 'download-btn';
            btn.innerHTML = '<i class="fas fa-file-archive"></i> تحميل ZIP';
            if (imgCount === 0) btn.disabled = true;
            btn.onclick = () => downloadZip(rec.meterNumber, rec.imagesUrls);
            btnCell.appendChild(btn);
        });
    }

    async function downloadZip(meterNumber, imageUrls) {
        if (!imageUrls || imageUrls.length === 0) return alert('لا توجد صور');
        const zip = new JSZip();
        let success = 0;
        for (let i = 0; i < imageUrls.length; i++) {
            try {
                const resp = await fetch(imageUrls[i]);
                const blob = await resp.blob();
                const ext = blob.type.split('/')[1] || 'jpg';
                zip.file(`${meterNumber}_img_${i+1}.${ext}`, blob);
                success++;
            } catch(e) { console.warn(e); }
        }
        if (success === 0) return alert('فشل تحميل الصور');
        const content = await zip.generateAsync({ type: 'blob' });
        saveAs(content, `العداد_${meterNumber}_الصور.zip`);
    }

    document.getElementById('refreshRecordsBtn').addEventListener('click', loadRecords);
    buildImageUploaders();
    loadRecords();
</script>
</body>
</html>
