<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل النشاط التجاري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 950px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; align-items: center; }
        h2 i { color: #667eea; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #34495e; }
        label i { margin-left: 8px; color: #667eea; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            background: #f9f9f9;
        }
        input:focus, select:focus, textarea:focus { border-color: #667eea; outline: none; background: white; }
        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 12px; border-radius: 50px; display: none; text-align: center; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 15px; margin-top: 10px; }
        .image-card { border: 2px solid #e0e0e0; border-radius: 20px; padding: 12px; text-align: center; background: white; cursor: pointer; transition: 0.2s; }
        .image-card:hover { border-color: #667eea; background: #fafafa; }
        .image-card i { font-size: 42px; color: #667eea; margin-bottom: 8px; }
        .image-card span { display: block; font-size: 13px; color: #555; }
        .image-card input { display: none; }
        .image-preview { max-width: 100%; max-height: 110px; border-radius: 12px; margin-top: 10px; display: none; object-fit: cover; }
        .image-filename { font-size: 10px; color: #2c3e50; margin-top: 5px; word-break: break-word; }
        .note { font-size: 12px; color: #7f8c8d; margin-top: 8px; display: flex; gap: 5px; align-items: center; }
        @media (max-width:600px) { .images-grid { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-clipboard-list"></i> تسجيل النشاط التجاري</h2>
    <form id="dataForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> الميداني</label>
            <select id="fieldOfficer" required>
                <option value="">-- اختر الميداني --</option>
                <option>ناصر الشهيل</option><option>سعود الشقير</option><option>فريح الرشيدي</option>
                <option>احمد السويدي</option><option>مفلح الشمري</option><option>علي الرشيدان</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-charging-station"></i> رقم العداد</label>
            <input type="text" id="meterNumber" placeholder="رقم العداد" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-building"></i> الصور (8 صور مطلوبة)</label>
            <div class="images-grid" id="imagesGrid"></div>
            <div class="note"><i class="fas fa-info-circle"></i> اضغط على كل مربع لاختيار أو التقاط صورة</div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-pen"></i> الملاحظات</label>
            <textarea id="notes" rows="3"></textarea>
        </div>
        <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
    </form>
    <div id="message" class="message"></div>
</div>

<script>
    // ⚠️ أدخل هنا رابط تطبيق الويب المنشور من Google Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyghsl_A83EZUa2Pa5zjiSc65ITJRqOxqbUjL_fuwB7l4x92Hw61n48d4dAeFWW9VcvUQ/exec'; // استبدله برابطك

    const imagesGrid = document.getElementById('imagesGrid');
    let imagesData = [];

    function createImageCard(index) {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.innerHTML = `
            <i class="fas fa-camera"></i>
            <span>صورة ${index + 1}</span>
            <input type="file" accept="image/*" capture="environment" required>
            <img class="image-preview" style="display:none;">
            <div class="image-filename"></div>
        `;
        const input = card.querySelector('input');
        const preview = card.querySelector('.image-preview');
        const filenameSpan = card.querySelector('.image-filename');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                filenameSpan.innerText = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                    imagesData[index] = {
                        fileName: file.name,
                        mimeType: file.type,
                        data: ev.target.result
                    };
                };
                reader.readAsDataURL(file);
            } else {
                imagesData[index] = null;
                preview.style.display = 'none';
                filenameSpan.innerText = '';
            }
        });
        card.addEventListener('click', () => input.click());
        return card;
    }

    for (let i = 0; i < 8; i++) {
        imagesGrid.appendChild(createImageCard(i));
    }

    const form = document.getElementById('dataForm');
    const msgDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgDiv.style.display = 'none';
        const officer = document.getElementById('fieldOfficer').value;
        const meter = document.getElementById('meterNumber').value.trim();
        const notes = document.getElementById('notes').value;

        if (!officer) return showMessage('اختر الميداني', 'error');
        if (!meter) return showMessage('أدخل رقم العداد', 'error');

        const missing = imagesData.findIndex(img => !img);
        if (missing !== -1) return showMessage(`الصورة رقم ${missing+1} مطلوبة`, 'error');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الرفع...';

        const payload = {
            fieldOfficer: officer,
            meterNumber: meter,
            images: imagesData,
            notes: notes
        };

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.result === 'success') {
                showMessage('✅ تم الإرسال بنجاح', 'success');
                form.reset();
                imagesData = [];
                document.querySelectorAll('.image-preview').forEach(img => img.style.display = 'none');
                document.querySelectorAll('.image-filename').forEach(span => span.innerText = '');
                document.querySelectorAll('input[type="file"]').forEach(input => input.value = '');
            } else {
                showMessage('❌ فشل الإرسال: ' + result.error, 'error');
            }
        } catch (err) {
            showMessage('❌ خطأ: ' + err.message, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال';
        }
    });

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => { if (msgDiv.style.display === 'block') msgDiv.style.display = 'none'; }, 5000);
    }
</script>
</body>
</html>
