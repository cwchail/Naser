<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل النشاط التجاري - الميدانيين والموقع الدقيق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h2 i { color: #667eea; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-group { margin-bottom: 5px; }
        .full-width { grid-column: span 2; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 15px;
        }
        label i {
            margin-left: 8px;
            color: #667eea;
            width: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        textarea { resize: vertical; min-height: 100px; }
        .location-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1a3b2e;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            width: 100%;
        }
        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 233, 123, 0.3);
        }
        .location-note {
            font-size: 13px;
            color: #2c3e50;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f0f4f8;
            padding: 8px 12px;
            border-radius: 30px;
        }
        .location-note i { color: #667eea; }
        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 25px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 50px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            display: block;
        }
        .note {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .note i { color: #667eea; font-size: 14px; }
        .image-upload {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .image-upload:hover {
            border-color: #667eea;
        }
        .image-upload i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .image-upload span {
            display: block;
            font-size: 14px;
            color: #555;
        }
        .image-upload input {
            display: none;
        }
        .image-preview {
            max-width: 100%;
            max-height: 120px;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
        }
        .image-filename {
            font-size: 12px;
            color: #2c3e50;
            margin-top: 5px;
            word-break: break-all;
        }
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        .image-card {
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 10px;
            background: #fff;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .images-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-clipboard-list"></i> تسجيل النشاط التجاري</h2>
        <form id="dataForm">
            <div class="form-grid">
                <!-- الميداني -->
                <div class="form-group full-width">
                    <label><i class="fas fa-user"></i> الميداني</label>
                    <select id="fieldOfficer" name="fieldOfficer" required>
                        <option value="">-- اختر الميداني --</option>
                        <option value="ناصر الشهيل">ناصر الشهيل</option>
                        <option value="سعود الشقير">سعود الشقير</option>
                        <option value="فريح الرشيدي">فريح الرشيدي</option>
                        <option value="احمد السويدي">احمد السويدي</option>
                        <option value="مفلح الشمري">مفلح الشمري</option>
                        <option value="علي الرشيدان">علي الرشيدان</option>
                    </select>
                </div>

                <!-- تصنيف العميل -->
                <div class="form-group full-width">
                    <label><i class="fas fa-user-tie"></i> تصنيف العميل</label>
                    <select id="customerType" name="customerType" required>
                        <option value="">-- اختر نوع العميل --</option>
                        <option value="سكنى">سكنى</option>
                        <option value="تجارى">تجارى</option>
                        <option value="حكومى">حكومى</option>
                    </select>
                </div>

                <!-- رقم العداد (جديد) -->
                <div class="form-group full-width">
                    <label><i class="fas fa-charging-station"></i> رقم العداد</label>
                    <input type="text" id="meterNumber" name="meterNumber" placeholder="أدخل رقم العداد" required>
                </div>

                <!-- حقل الموقع -->
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> خط العرض (Latitude)</label>
                    <input type="text" id="latitude" name="latitude" placeholder="مثال: 24.7136" readonly required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> خط الطول (Longitude)</label>
                    <input type="text" id="longitude" name="longitude" placeholder="مثال: 46.6753" readonly required>
                </div>

                <!-- زر جلب الموقع -->
                <div class="form-group full-width">
                    <button type="button" class="location-btn" id="getLocationBtn">
                        <i class="fas fa-location-dot"></i> جلب الموقع الحالي (بدقة أقل من 10 أمتار)
                    </button>
                    <div class="location-note" id="locationStatus">
                        <i class="fas fa-info-circle"></i> لم يتم تحديد الموقع بعد.
                    </div>
                </div>

                <!-- 5 صور للمبنى -->
                <div class="form-group full-width">
                    <label><i class="fas fa-building"></i> صور المبنى (5 صور مطلوبة)</label>
                    <div class="images-grid" id="imagesGrid">
                        <!-- سيتم إنشاء 5 بطاقات صور بواسطة JS -->
                    </div>
                    <div class="note"><i class="fas fa-info-circle"></i> يرجى التقاط 5 صور واضحة للمبنى من زوايا مختلفة (واجهة، خلفية، جانبية، عداد، لافتة)</div>
                </div>

                <!-- الملاحظات -->
                <div class="form-group full-width">
                    <label><i class="fas fa-pen"></i> الملاحظات</label>
                    <textarea id="notes" name="notes" placeholder="أي ملاحظات إضافية..."></textarea>
                </div>
            </div>
            <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> إرسال البيانات</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        (function() {
            const IMGBB_API_KEY = '80e250fa77e32dc6df4bbd54eb7af292';
            
            // عناصر الموقع
            const latInput = document.getElementById('latitude');
            const lngInput = document.getElementById('longitude');
            const locationStatus = document.getElementById('locationStatus');
            const locBtn = document.getElementById('getLocationBtn');
            let locationAccuracy = null;

            locBtn.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    locationStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> المتصفح لا يدعم تحديد الموقع.';
                    return;
                }
                locationStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الحصول على الموقع...';
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const acc = pos.coords.accuracy;
                        locationAccuracy = acc;
                        latInput.value = lat.toFixed(6);
                        lngInput.value = lng.toFixed(6);
                        if (acc <= 10) {
                            locationStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#28a745;"></i> تم تحديد الموقع بدقة ${acc.toFixed(1)} متر (أقل من 10 أمتار) ✓`;
                        } else {
                            locationStatus.innerHTML = `<i class="fas fa-exclamation-circle" style="color:#ffc107;"></i> تم تحديد الموقع بدقة ${acc.toFixed(1)} متر (أكبر من 10 أمتار). يرجى المحاولة مرة أخرى في مكان مكشوف أكثر.`;
                        }
                    },
                    function(err) {
                        let msg = '';
                        switch(err.code) {
                            case err.PERMISSION_DENIED: msg = 'تم رفض الإذن بالوصول إلى الموقع.'; break;
                            case err.POSITION_UNAVAILABLE: msg = 'معلومات الموقع غير متوفرة.'; break;
                            case err.TIMEOUT: msg = 'انتهت مهلة محاولة الحصول على الموقع.'; break;
                            default: msg = 'حدث خطأ غير معروف.';
                        }
                        locationStatus.innerHTML = `<i class="fas fa-times-circle" style="color:#dc3545;"></i> ${msg}`;
                        locationAccuracy = null;
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            });

            // إنشاء بطاقات الصور الخمس
            const imagesGrid = document.getElementById('imagesGrid');
            const imageFiles = []; // لتخزين كائنات الملفات لكل صورة
            const imagePreviews = [];
            const imageFilenames = [];

            for (let i = 1; i <= 5; i++) {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="image-upload" data-index="${i-1}">
                        <i class="fas fa-camera"></i>
                        <span>صورة المبنى ${i}</span>
                        <input type="file" accept="image/*" capture="environment" required>
                        <img class="image-preview" style="display:none;">
                        <div class="image-filename"></div>
                    </div>
                `;
                imagesGrid.appendChild(card);
                const uploadDiv = card.querySelector('.image-upload');
                const fileInput = uploadDiv.querySelector('input');
                const previewImg = uploadDiv.querySelector('.image-preview');
                const filenameSpan = uploadDiv.querySelector('.image-filename');

                imageFiles.push(null);
                imagePreviews.push(previewImg);
                imageFilenames.push(filenameSpan);

                fileInput.addEventListener('change', (function(idx) {
                    return function(event) {
                        const file = event.target.files[0];
                        if (file) {
                            imageFiles[idx] = file;
                            imageFilenames[idx].textContent = file.name;
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                imagePreviews[idx].src = e.target.result;
                                imagePreviews[idx].style.display = 'block';
                            };
                            reader.readAsDataURL(file);
                        } else {
                            imageFiles[idx] = null;
                            imagePreviews[idx].style.display = 'none';
                            imageFilenames[idx].textContent = '';
                        }
                    };
                })(i-1));
            }

            // رفع صورة واحدة إلى ImgBB
            async function uploadImage(file) {
                const formData = new FormData();
                formData.append('image', file);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) {
                    throw new Error('فشل رفع الصورة');
                }
                const data = await response.json();
                return data.data.url;
            }

            // رفع جميع الصور الخمس
            async function uploadAllImages(files) {
                const uploadPromises = files.map(file => uploadImage(file));
                return await Promise.all(uploadPromises);
            }

            // إرسال النموذج
            const form = document.getElementById('dataForm');
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';

                const fieldOfficer = document.getElementById('fieldOfficer').value;
                const customerType = document.getElementById('customerType').value;
                const meterNumber = document.getElementById('meterNumber').value.trim();
                const latitude = document.getElementById('latitude').value;
                const longitude = document.getElementById('longitude').value;
                const notes = document.getElementById('notes').value;

                if (!fieldOfficer) return showMessage('الرجاء اختيار الميداني', 'error');
                if (!customerType) return showMessage('الرجاء اختيار تصنيف العميل', 'error');
                if (!meterNumber) return showMessage('الرجاء إدخال رقم العداد', 'error');
                if (!latitude || !longitude) return showMessage('الرجاء تحديد الموقع باستخدام الزر أعلاه', 'error');
                if (locationAccuracy && locationAccuracy > 10) {
                    return showMessage(`⚠️ دقة الموقع ${locationAccuracy.toFixed(1)} متر أكبر من 10 أمتار. يرجى إعادة المحاولة في مكان مكشوف للحصول على دقة أفضل.`, 'error');
                }
                // التحقق من وجود 5 صور
                const missingIndex = imageFiles.findIndex(f => !f);
                if (missingIndex !== -1) {
                    return showMessage(`الرجاء إرفاق الصورة رقم ${missingIndex+1} للمبنى`, 'error');
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري رفع الصور الخمس... قد يستغرق بعض الوقت';

                try {
                    // رفع الصور
                    let imageUrls;
                    try {
                        imageUrls = await uploadAllImages(imageFiles);
                    } catch (uploadErr) {
                        showMessage('❌ فشل رفع إحدى الصور: ' + uploadErr.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البيانات';
                        return;
                    }

                    const payload = {
                        fieldOfficer: fieldOfficer,
                        customerType: customerType,
                        meterNumber: meterNumber,
                        latitude: latitude,
                        longitude: longitude,
                        buildingImageUrls: imageUrls, // مصفوفة من 5 روابط
                        notes: notes
                    };

                    const scriptURL = 'https://script.google.com/macros/s/AKfycbxMU5hZEBKMmdRxLqQnEiPaFuaUmwd1aOFjFYNyy6efpO1R3Dqmn4oLqGdKl-5C8kAJmg/exec';

                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'cors',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const result = await response.json();

                    if (result.result === 'success') {
                        showMessage('✅ تم إرسال البيانات بنجاح!', 'success');
                        form.reset();
                        latInput.value = '';
                        lngInput.value = '';
                        locationStatus.innerHTML = '<i class="fas fa-info-circle"></i> لم يتم تحديد الموقع بعد.';
                        locationAccuracy = null;
                        // إعادة تعيين معاينات الصور
                        for (let i = 0; i < imagePreviews.length; i++) {
                            imagePreviews[i].style.display = 'none';
                            imageFilenames[i].textContent = '';
                            imageFiles[i] = null;
                            // إعادة تعيين input file (يجب مسح قيمته يدوياً)
                            const card = imagesGrid.children[i];
                            const fileInput = card.querySelector('input');
                            fileInput.value = '';
                        }
                    } else {
                        showMessage('❌ فشل الإرسال: ' + (result.error || 'خطأ غير معروف'), 'error');
                    }
                } catch (error) {
                    console.error(error);
                    showMessage('❌ حدث خطأ: ' + error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البيانات';
                }
            });

            function showMessage(text, type) {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
                messageDiv.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
