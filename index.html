<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل الاستبدال - الصور ورقم العداد</title>
    <!-- Font Awesome & Tailwind-like utilities (custom) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- JSZip و FileSaver لتحميل الصور كملف مضغوط -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* main container */
        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            padding: 30px 35px;
            margin-bottom: 40px;
            transition: all 0.2s;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 28px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        h2 i {
            color: #2a5298;
        }

        h3 {
            font-size: 22px;
            color: #0f3b5f;
            margin: 15px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-right: 5px solid #2a5298;
            padding-right: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 8px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #1e293b;
            font-size: 1rem;
        }

        label i {
            margin-left: 8px;
            color: #2a5298;
            width: 24px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.25s;
            background-color: #fefefe;
        }

        input:focus, select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.2);
            outline: none;
        }

        /* صور متعددة */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 12px;
        }

        .image-upload-card {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-upload-card:hover {
            border-color: #2a5298;
            background: #f1f5f9;
        }

        .image-upload-card i {
            font-size: 36px;
            color: #2a5298;
            margin-bottom: 8px;
        }

        .image-upload-card span {
            display: block;
            font-size: 13px;
            color: #334155;
            font-weight: 500;
        }

        .image-preview-small {
            max-width: 100%;
            max-height: 110px;
            margin-top: 12px;
            border-radius: 16px;
            object-fit: cover;
            display: none;
            border: 1px solid #cbd5e1;
        }

        .file-name {
            font-size: 11px;
            color: #475569;
            margin-top: 6px;
            word-break: break-all;
        }

        .note {
            font-size: 13px;
            color: #475569;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button.submit-btn {
            background: linear-gradient(95deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 18px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(30, 60, 114, 0.5);
        }

        .message {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 60px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            display: block;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }

        /* جدول السجلات */
        .records-table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #eef2ff;
            color: #1e293b;
            padding: 14px 10px;
            text-align: center;
            font-weight: 700;
        }

        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 14px 8px;
            text-align: center;
            vertical-align: middle;
        }

        .download-btn {
            background: #0f3b5f;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .download-btn:hover {
            background: #1e5a8a;
            transform: scale(0.97);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .refresh-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            margin-right: 15px;
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 700px) {
            .card { padding: 20px; }
            .images-grid { grid-template-columns: 1fr; }
            th, td { font-size: 12px; padding: 8px 4px; }
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <!-- نموذج الإدخال: فقط رقم العداد + 5 صور -->
    <div class="card">
        <h2><i class="fas fa-store"></i> تسجيل النشاط التجاري</h2>
        <form id="registerForm">
            <div class="form-grid">
                <!-- رقم العداد (الحقل الوحيد النصي) -->
                <div class="form-group">
                    <label><i class="fas fa-tachometer-alt"></i> رقم العداد</label>
                    <input type="text" id="meterNumber" name="meterNumber" placeholder="أدخل رقم العداد (إجباري)" required>
                    <div class="note"><i class="fas fa-info-circle"></i> رقم العداد فريد لربط الصور به.</div>
                </div>

                <!-- 5 صور -->
                <div class="form-group">
                    <label><i class="fas fa-images"></i> صور المبنى (5 صور كحد أقصى)</label>
                    <div class="images-grid" id="imagesContainer">
                        <!-- سيتم إنشاء 5 بطاقات رفع بالجافاسكريبت -->
                    </div>
                    <div class="note"><i class="fas fa-camera"></i> يُفضل التقاط صور واضحة للمبنى من الخارج والداخل إن أمكن.</div>
                </div>

                <button type="submit" class="submit-btn" id="sendBtn">
                    <i class="fas fa-cloud-upload-alt"></i> رفع البيانات والصور
                </button>
                <div id="formMessage" class="message"></div>
            </div>
        </form>
    </div>

    <!-- قسم عرض السجلات وتحميل الصور لكل عداد -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h3><i class="fas fa-database"></i> السجلات المضافة &nbsp; <i class="fas fa-download"></i> تحميل صور كل عداد</h3>
            <button class="refresh-btn" id="refreshRecordsBtn"><i class="fas fa-sync-alt"></i> تحديث القائمة</button>
        </div>
        <div class="records-table-wrapper">
            <table id="recordsTable">
                <thead>
                    <tr><th>رقم العداد</th><th>تاريخ التسجيل</th><th>عدد الصور</th><th>تحميل الصور (ZIP)</th></tr>
                </thead>
                <tbody id="recordsTbody">
                    <tr><td colspan="4" style="text-align:center;">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ---------- إعدادات API ----------
    // مفتاح ImgBB (نفس المفتاح الموجود في الكود الأصلي)
    const IMGBB_API_KEY = '80e250fa77e32dc6df4bbd54eb7af292';
    // رابط Google Apps Script (يجب تعديله بعد النشر)
    // استخدم نفس الرابط الذي سيتم نشره من Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyat192xF-0O2kA4F1BQSpYqOx5vHd_NNVJwTUWP52GPHQL6RUE2m3GI9WBhyKEHcZTvA/exec';

    // ---------- متغيرات ----------
    let imageFiles = [];   // مصفوفة تحتوي على ملفات الصور (حجم 5)
    let imagePreviews = []; // عناصر المعاينة لكل فهرس
    let fileNamesSpan = [];

    // إنشاء واجهة رفع 5 صور
    function buildImageUploaders() {
        const container = document.getElementById('imagesContainer');
        container.innerHTML = '';
        imageFiles = new Array(5).fill(null);
        imagePreviews = new Array(5);
        fileNamesSpan = new Array(5);

        for (let i = 0; i < 5; i++) {
            const card = document.createElement('div');
            card.className = 'image-upload-card';
            card.setAttribute('data-index', i);
            const icon = document.createElement('i');
            icon.className = 'fas fa-image';
            const spanLabel = document.createElement('span');
            spanLabel.innerText = `الصورة ${i+1}`;
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            fileInput.setAttribute('data-idx', i);
            const previewImg = document.createElement('img');
            previewImg.className = 'image-preview-small';
            previewImg.id = `preview_${i}`;
            const fileNameSpan = document.createElement('div');
            fileNameSpan.className = 'file-name';
            fileNameSpan.id = `fname_${i}`;

            card.appendChild(icon);
            card.appendChild(spanLabel);
            card.appendChild(fileInput);
            card.appendChild(previewImg);
            card.appendChild(fileNameSpan);

            // عند النقر على البطاقة يتم فتح اختيار الملف
            card.addEventListener('click', (e) => {
                if (e.target !== fileInput) fileInput.click();
            });
            fileInput.addEventListener('change', (e) => {
                const idx = parseInt(fileInput.getAttribute('data-idx'));
                const file = e.target.files[0];
                if (file) {
                    imageFiles[idx] = file;
                    // معاينة
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        previewImg.src = ev.target.result;
                        previewImg.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                    fileNameSpan.innerText = file.name.length > 30 ? file.name.substring(0,27)+'...' : file.name;
                } else {
                    imageFiles[idx] = null;
                    previewImg.style.display = 'none';
                    fileNameSpan.innerText = '';
                }
            });
            container.appendChild(card);
            imagePreviews[i] = previewImg;
            fileNamesSpan[i] = fileNameSpan;
        }
    }

    // رفع الصورة الواحدة إلى ImgBB
    async function uploadSingleImage(file) {
        const formData = new FormData();
        formData.append('image', file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
        });
        if (!response.ok) throw new Error('فشل رفع الصورة إلى ImgBB');
        const data = await response.json();
        if (!data.success) throw new Error('استجابة ImgBB غير ناجحة');
        return data.data.url;
    }

    // رفع جميع الصور (غير الفارغة) وإرجاع مصفوفة الروابط
    async function uploadAllImages(filesArray) {
        const urls = [];
        for (let i = 0; i < filesArray.length; i++) {
            const file = filesArray[i];
            if (file) {
                try {
                    const url = await uploadSingleImage(file);
                    urls.push(url);
                } catch (err) {
                    console.error(`خطأ في رفع الصورة ${i+1}`, err);
                    throw new Error(`فشل رفع الصورة رقم ${i+1}: ${err.message}`);
                }
            } else {
                urls.push(''); // صورة فارغة (لن نضيفها لكن نحافظ على الترتيب اختياري)
            }
        }
        return urls;
    }

    // عرض رسالة
    function showMessage(text, type) {
        const msgDiv = document.getElementById('formMessage');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        setTimeout(() => {
            if (msgDiv.className.includes(type)) {
                msgDiv.style.display = 'none';
                msgDiv.className = 'message';
            }
        }, 5000);
        msgDiv.style.display = 'block';
    }

    // إرسال النموذج
    const form = document.getElementById('registerForm');
    const sendBtn = document.getElementById('sendBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const meterNumber = document.getElementById('meterNumber').value.trim();
        if (!meterNumber) {
            showMessage('الرجاء إدخال رقم العداد', 'error');
            return;
        }
        // التأكد من وجود صورة واحدة على الأقل (اختياري لكن موصى به)
        const hasAnyImage = imageFiles.some(f => f !== null);
        if (!hasAnyImage) {
            showMessage('يجب رفع صورة واحدة على الأقل للمبنى', 'error');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري رفع الصور وإرسال البيانات...';

        try {
            // رفع الصور الفعلية (غير الفارغة فقط)
            const uploadedUrls = await uploadAllImages(imageFiles);
            // تصفية الروابط الفارغة (نرسل فقط الروابط الحقيقية)
            const validUrls = uploadedUrls.filter(url => url && url !== '');
            
            // تجهيز الكائن للإرسال
            const payload = {
                meterNumber: meterNumber,
                images: validUrls,      // قائمة روابط الصور
                timestamp: new Date().toISOString()
            };

            // إرسال إلى Google Apps Script
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.result === 'success') {
                showMessage('✅ تم تسجيل النشاط والصور بنجاح!', 'success');
                form.reset();
                // إعادة تعيين معاينات الصور
                for (let i = 0; i < 5; i++) {
                    imageFiles[i] = null;
                    if (imagePreviews[i]) imagePreviews[i].style.display = 'none';
                    if (fileNamesSpan[i]) fileNamesSpan[i].innerText = '';
                    // إعادة تعيين الـ input files
                    const cards = document.querySelectorAll('.image-upload-card');
                    if (cards[i]) {
                        const inp = cards[i].querySelector('input[type="file"]');
                        if (inp) inp.value = '';
                    }
                }
                // تحديث جدول السجلات بعد الإضافة
                await loadRecords();
            } else {
                showMessage('❌ فشل الحفظ: ' + (result.error || 'خطأ غير معروف'), 'error');
            }
        } catch (err) {
            console.error(err);
            showMessage('❌ خطأ في الاتصال أو الرفع: ' + err.message, 'error');
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> رفع البيانات والصور';
        }
    });

    // ---------- جلب جميع السجلات من Google Sheets عبر doGet وعرضها مع أزرار تحميل ZIP ----------
    async function loadRecords() {
        const tbody = document.getElementById('recordsTbody');
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل السجلات...</td></tr>';
        try {
            // نستخدم نفس SCRIPT_URL ولكن بـ doGet (نضيف ?action=fetch)
            const fetchUrl = `${SCRIPT_URL}?action=fetch&t=${Date.now()}`;
            const response = await fetch(fetchUrl, { method: 'GET', headers: { 'Accept': 'application/json' } });
            if (!response.ok) throw new Error('فشل تحميل البيانات');
            const data = await response.json();
            if (data.result === 'success' && Array.isArray(data.records)) {
                renderRecordsTable(data.records);
            } else {
                tbody.innerHTML = '<tr><td colspan="4">⚠️ لا توجد سجلات أو خطأ في القراءة</td></tr>';
            }
        } catch (err) {
            console.error(err);
            tbody.innerHTML = '<tr><td colspan="4">❌ تعذر تحميل السجلات. تأكد من نشر الـ Apps Script بشكل صحيح.</td></tr>';
        }
    }

    // عرض السجلات في الجدول مع زر تحميل لكل عداد
    function renderRecordsTable(records) {
        const tbody = document.getElementById('recordsTbody');
        if (!records.length) {
            tbody.innerHTML = '<tr><td colspan="4">لا توجد سجلات حتى الآن. قم بإضافة أول نشاط.</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        records.forEach(record => {
            const row = tbody.insertRow();
            const meterCell = row.insertCell(0);
            const dateCell = row.insertCell(1);
            const imagesCountCell = row.insertCell(2);
            const actionCell = row.insertCell(3);
            
            const meterNum = record.meterNumber || 'بدون رقم';
            meterCell.textContent = meterNum;
            const dateStr = record.date ? new Date(record.date).toLocaleString('ar-SA') : '-';
            dateCell.textContent = dateStr;
            const imagesArray = record.imagesUrls || [];
            const imgCount = imagesArray.length;
            imagesCountCell.textContent = `${imgCount} صورة`;
            
            // زر تحميل الصور لهذا العداد
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.innerHTML = '<i class="fas fa-file-archive"></i> تحميل ZIP';
            downloadBtn.addEventListener('click', async () => {
                await downloadImagesAsZip(meterNum, imagesArray);
            });
            if (imgCount === 0) {
                downloadBtn.disabled = true;
                downloadBtn.style.opacity = '0.5';
                downloadBtn.title = 'لا توجد صور لهذا العداد';
            }
            actionCell.appendChild(downloadBtn);
        });
    }

    // دالة تحميل الصور كملف مضغوط (ZIP) لكل عداد
    async function downloadImagesAsZip(meterNumber, imageUrls) {
        if (!imageUrls || imageUrls.length === 0) {
            alert(`لا توجد صور مسجلة للعداد: ${meterNumber}`);
            return;
        }
        // إظهار مؤقت داخل الزر (تعديل بسيط)
        const buttons = document.querySelectorAll('.download-btn');
        let targetBtn = null;
        for (let btn of buttons) {
            if (btn.innerHTML.includes('تحميل ZIP') && !btn.disabled) {
                // سنجد الزر المناسب بواسطة سياق آخر لكن نعتمد على أن المستخدم ضغط على زر معين
                // سيكون targetBtn هو الحدث الحالي, لكن في async function نستطيع تحديد الزر من خلال event؟
                // سنقوم بتمرير العنصر من خلال الاستدعاء لكن الطريقة الحالية نعدل:
                break;
            }
        }
        // ببساطة نعرض loader مؤقت
        const loadingAlert = document.createElement('div');
        loadingAlert.className = 'message info';
        loadingAlert.textContent = 'جاري تجهيل الصور وضغطها...';
        // لا نستخدم alert مزعج, نعرض رسالة صغيرة
        const originalText = 'تحميل ZIP';
        // نجد كل الأزرار ونعطل الزر الذي حدث عليه الحدث - لكن سنحسن:
        const allBtns = Array.from(document.querySelectorAll('.download-btn'));
        const clickedBtn = allBtns.find(btn => btn.innerHTML.includes('تحميل ZIP') && !btn.disabled && btn === document.activeElement) || allBtns.find(btn => !btn.disabled);
        if (clickedBtn) {
            clickedBtn.disabled = true;
            clickedBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جارٍ التحميل';
        }
        try {
            const zip = new JSZip();
            let successfulDownloads = 0;
            for (let idx = 0; idx < imageUrls.length; idx++) {
                const url = imageUrls[idx];
                if (!url) continue;
                try {
                    const response = await fetch(url, { mode: 'cors' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const blob = await response.blob();
                    const extension = blob.type.split('/')[1] || 'jpg';
                    const fileName = `${meterNumber}_img_${idx+1}.${extension}`;
                    zip.file(fileName, blob, { binary: true });
                    successfulDownloads++;
                } catch (err) {
                    console.warn(`فشل تحميل صورة ${idx+1} من الرابط ${url}`, err);
                    // نستمر مع بقية الصور
                }
            }
            if (successfulDownloads === 0) {
                alert(`فشل تحميل أي صورة للعداد ${meterNumber}. تأكد من روابط الصور أو اتصال الإنترنت.`);
                return;
            }
            const content = await zip.generateAsync({ type: 'blob' });
            saveAs(content, `العداد_${meterNumber}_الصور.zip`);
        } catch (error) {
            console.error(error);
            alert('حدث خطأ أثناء إنشاء ملف ZIP: ' + error.message);
        } finally {
            if (clickedBtn) {
                clickedBtn.disabled = false;
                clickedBtn.innerHTML = '<i class="fas fa-file-archive"></i> تحميل ZIP';
            }
        }
    }

    // تحديث يدوي
    document.getElementById('refreshRecordsBtn').addEventListener('click', () => {
        loadRecords();
    });

    // تهيئة واجهة الصور
    buildImageUploaders();
    // تحميل السجلات عند بدء الصفحة
    loadRecords();
</script>
</body>
</html>
